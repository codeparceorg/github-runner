apiVersion: actions.summerwind.dev/v1alpha1
kind: RunnerDeployment
metadata:
  name: org-runners
  namespace: actions-runner-system
spec:
  replicas: 1
  template:
    spec:
      image: ghcr.io/codeparceorg/runner-arc:latest # summerwind/actions-runner-dind
      imagePullSecrets:
        - name: ghcr-secret
      dockerdWithinRunnerContainer: true
      organization: codeparceorg
      group: lab
      labels:
        - devops
        - kubernetes 
        - linux
      ephemeral: true
      resources:
        requests:
          cpu: "0.25"
          memory: "512Mi"
        limits:
          cpu: "0.5"
          memory: "1Gi"