apiVersion: actions.summerwind.dev/v1alpha1
kind: RunnerDeployment
metadata:
  name: org-runners
  namespace: actions-runner-system
spec:
  replicas: 1
  template:
    spec:
      organization: codeparceorg
      group: lab
      labels:
        - devops
        - kubernetes 
        - linux
      ephemeral: true
      resources:
        requests:
          cpu: "1"
          memory: "512Mi"
        limits:
          cpu: "2"
          memory: "1Gi"